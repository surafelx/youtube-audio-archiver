<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Audio Archiver</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            font-size: 0.9em;
        }
        
        .status-panel {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .status-label {
            color: #888;
            font-weight: 500;
        }
        
        .status-value {
            font-weight: 600;
            color: #fff;
        }
        
        .status-badge {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .status-badge.idle { background: #4a4a4a; color: #aaa; }
        .status-badge.running { background: #27ae60; color: #fff; }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .panel {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .panel-title {
            font-size: 1.2em;
            font-weight: 600;
        }
        
        .add-channel-form {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        input[type="text"], input[type="number"] {
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1em;
        }
        
        input:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        
        .channel-list {
            max-height: 300px;
            overflow-y: auto;
        }
        
        .channel-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .channel-url {
            color: #aaa;
            font-size: 0.9em;
            word-break: break-all;
        }
        
        .btn-remove {
            padding: 6px 12px;
            background: rgba(231,76,60,0.2);
            color: #e74c3c;
            font-size: 0.85em;
        }
        
        .log-panel {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .log-content {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85em;
            background: #0d0d0d;
            padding: 15px;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
            color: #0f0;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        .options-row {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        
        .option-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .option-group label {
            color: #aaa;
        }
        
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }
        
        input[type="number"] {
            width: 100px;
        }
        
        .empty-state {
            text-align: center;
            padding: 30px;
            color: #666;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>YouTube Audio Archiver</h1>
            <p class="subtitle">Simple downloader using yt-dlp</p>
        </header>
        
        <!-- Status Panel -->
        <div class="status-panel">
            <div class="status-row">
                <span class="status-label">Status</span>
                <span id="status-badge" class="status-badge idle">IDLE</span>
            </div>
        </div>
        
        <!-- Download Options -->
        <div class="panel">
            <div class="panel-header">
                <h2 class="panel-title">Download Options</h2>
            </div>
            
            <div class="options-row">
                <div class="option-group">
                    <input type="checkbox" id="test-mode">
                    <label for="test-mode">Test Mode (5 videos per channel)</label>
                </div>
                <div class="option-group">
                    <label for="download-limit">Max Downloads:</label>
                    <input type="number" id="download-limit" min="0" value="0" placeholder="0=unlimited">
                </div>
            </div>
            
            <div class="controls">
                <button id="btn-start" class="btn-primary" onclick="startDownload()">Start Download</button>
                <button id="btn-stop" class="btn-danger" onclick="stopDownload()" disabled>Stop</button>
            </div>
        </div>
        
        <!-- Channel Management -->
        <div class="panel">
            <div class="panel-header">
                <h2 class="panel-title">Channels</h2>
                <span id="channel-count">0 channels</span>
            </div>
            
            <div class="add-channel-form">
                <input type="text" id="new-channel-url" placeholder="Enter YouTube channel URL">
                <button class="btn-primary" onclick="addChannel()">Add</button>
            </div>
            
            <div id="channel-list" class="channel-list">
                <div class="empty-state">No channels added yet</div>
            </div>
        </div>
        
        <!-- Log Panel -->
        <div class="log-panel">
            <div class="panel-header">
                <h2 class="panel-title">Download Log (Live)</h2>
            </div>
            <div id="log-content" class="log-content">Starting log stream...</div>
        </div>
    </div>
    
    <script>
        let eventSource = null;
        
        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadChannels();
            startLogStream();
            refreshStatus();
            setInterval(refreshStatus, 2000);
        });
        
        // Server-Sent Events for log streaming
        function startLogStream() {
            if (eventSource) eventSource.close();
            
            const logContent = document.getElementById('log-content');
            logContent.textContent = 'Connecting to log stream...\n';
            
            eventSource = new EventSource('/api/logs/stream');
            
            eventSource.onmessage = function(event) {
                const logLine = event.data;
                if (logLine) {
                    logContent.textContent += logLine + '\n';
                    logContent.scrollTop = logContent.scrollHeight;
                }
            };
            
            eventSource.onerror = function() {
                logContent.textContent += '[Reconnecting...]\n';
            };
        }
        
        // Load channels
        async function loadChannels() {
            try {
                const response = await fetch('/api/channels');
                const data = await response.json();
                
                document.getElementById('channel-count').textContent = `${data.channels.length} channels`;
                
                if (data.channels.length === 0) {
                    document.getElementById('channel-list').innerHTML = '<div class="empty-state">No channels</div>';
                    return;
                }
                
                document.getElementById('channel-list').innerHTML = data.channels.map(ch => `
                    <div class="channel-item">
                        <span class="channel-url">${escapeHtml(ch)}</span>
                        <button class="btn-remove" onclick="removeChannel('${escapeHtml(ch)}')">Remove</button>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        // Add channel
        async function addChannel() {
            const url = document.getElementById('new-channel-url').value.trim();
            if (!url) return;
            
            await fetch('/api/channels', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            });
            
            document.getElementById('new-channel-url').value = '';
            loadChannels();
        }
        
        // Remove channel
        async function removeChannel(url) {
            if (!confirm('Remove?')) return;
            await fetch('/api/channels', {
                method: 'DELETE',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({url})
            });
            loadChannels();
        }
        
        // Refresh status
        async function refreshStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                const badge = document.getElementById('status-badge');
                badge.textContent = data.status;
                badge.className = 'status-badge ' + data.status.toLowerCase();
                
                // Update buttons
                const isRunning = data.status === 'RUNNING';
                document.getElementById('btn-start').disabled = isRunning;
                document.getElementById('btn-stop').disabled = !isRunning;
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        // Start download
        async function startDownload() {
            const testMode = document.getElementById('test-mode').checked;
            const limit = parseInt(document.getElementById('download-limit').value) || 0;
            
            const response = await fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    test_mode: testMode,
                    limit: limit
                })
            });
            
            const data = await response.json();
            if (!data.success) {
                alert(data.error || 'Failed to start');
            }
        }
        
        // Stop download
        async function stopDownload() {
            await fetch('/api/stop', {method: 'POST'});
        }
        
        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Allow Enter key
        document.getElementById('new-channel-url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addChannel();
        });
    </script>
</body>
</html>
